name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
    tags:
      - 'v*' # Triggers the CD release phase when pushing tags like v0.1.0
  pull_request:
    branches: [ main, dev ]

jobs:
  test-and-lint:
    name: Test and Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Run matrix checks matching flint-core target specifications
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load Cached Virtualenv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}

      - name: Install Project Dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Run Ruff Linter Code Check
        run: poetry run ruff check ./flint_core/

      - name: Run Ruff Code Formatter Check
        run: poetry run ruff format --check ./flint_core/

      - name: Run Tests with Strict Coverage Gate (>= 10%)
        # Specifies our package source target and enforces a hard fail threshold
        run: poetry run pytest --cov=flint_core --cov-fail-under=10

  deploy-pypi:
    name: Publish Artifact to PyPI
    needs: test-and-lint
    runs-on: ubuntu-latest
    # 🌟 CRITICAL GATE: Only execute deployment if the push is an official 'v*' tag
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install Dependencies
        run: poetry install --no-interaction --no-root

      - name: Build Package Distribution Binaries
        run: poetry build

      - name: Publish to PyPI Marketplace Index
        env:
          # Automatically authenticates using your secure GitHub Repository Secret token
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_TOKEN }}
        run: poetry publish